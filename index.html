<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>祖安语录 - 火力全开</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <main class="frame">
    <header class="hero">
      <div class="brand">CAONIMA.DE</div>
      <h1>祖安语录</h1>
      <p class="sub">
        吐槽生成器 · 点击按钮随机输出 · 保持分寸，别真伤人
      </p>
    </header>

    <section class="panel" aria-live="polite">
      <div class="panel-top">
        <div class="mode" id="modeBadge">模式：火力全开</div>
        <div class="signal">
          <span class="dot"></span>
          READY
        </div>
      </div>
      <div class="output" id="output">点击下方按钮开始</div>
    </section>

    <section class="controls">
      <button class="btn primary" id="btnBlast">火力全开</button>
      <button class="btn ghost" id="btnLotus">口吐莲花</button>
      <button class="btn" id="btnBack">后退</button>
      <button class="btn warn" id="btnDad">骂爹模式</button>
      <button class="btn copy" id="btnCopy">复制 COPY</button>
    </section>

    <section class="notes">
      <div>提示：双击输出区域可再生成一条。</div>
      <div>免责声明：内容仅供娱乐，请勿用于人身攻击。</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
